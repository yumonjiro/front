server {
    listen 80;
    server_name countobj.geelive-test.com;

    # certbot が証明書取得時にここを使う
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # HTTP → HTTPS リダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name countobj.geelive-test.com;

    ssl_certificate     /etc/letsencrypt/live/countobj.geelive-test.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/countobj.geelive-test.com/privkey.pem;

    client_max_body_size 20M;

    # Vite dev server へのプロキシ
    location / {
        proxy_pass http://localhost:5180;
        proxy_http_version 1.1;

        # WebSocket (HMR) のために必要
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}